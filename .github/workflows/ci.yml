name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc make gcovr cppcheck

      - name: Build
        run: make build

      - name: Test
        run: make test

      - name: Coverage
        run: |
          make coverage
          gcovr --config .gcovr.cfg --print-summary --fail-under-line 80 --fail-under-branch 80
          gcovr --config .gcovr.cfg --filter '.*graph\.c' --fail-under-line 90
          gcovr --config .gcovr.cfg --filter '.*travels\.c' --fail-under-line 90
          gcovr --config .gcovr.cfg --filter '.*userManager\.c' --fail-under-line 90
          gcovr --config .gcovr.cfg --filter '.*password\.c' --fail-under-line 90
          gcovr --config .gcovr.cfg --filter '.*stats\.c' --fail-under-line 90

      - name: Static analysis
        run: cppcheck --enable=warning,style,performance,portability --error-exitcode=1 .
