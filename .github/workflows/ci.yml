name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc make gcovr cppcheck

      - name: Build
        run: make build

      - name: Test
        run: make test

      - name: Coverage
        run: |
          make coverage
          gcovr --config .gcovr.cfg --root . --print-summary --fail-under-line 80 --fail-under-branch 75
          gcovr --config .gcovr.cfg --root . --filter 'src/core/graph\.c' --fail-under-line 90
          gcovr --config .gcovr.cfg --root . --filter 'src/core/travels\.c' --fail-under-line 90
          gcovr --config .gcovr.cfg --root . --filter 'src/manager/userManager\.c' --fail-under-line 85
          gcovr --config .gcovr.cfg --root . --filter 'src/core/password\.c' --fail-under-line 90
          gcovr --config .gcovr.cfg --root . --filter 'src/manager/stats\.c' --fail-under-line 90

      - name: Static analysis
        run: cppcheck --std=c11 --enable=warning,style,performance,portability --error-exitcode=1 src/core/graph.c src/core/travels.c src/core/password.c src/manager/userManager.c src/manager/stats.c
